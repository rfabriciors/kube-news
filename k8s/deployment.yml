apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      serviceAccountName: kube-news-sa
      automountServiceAccountToken: false
      containers:
        - name: kube-news-database
          image: postgres:15.0
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-kube-news
                  key: DB_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-kube-news
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-kube-news
                  key: DB_PASSWORD
          ports:
            - name: db
              containerPort: 5432
              protocol: TCP
          resources:
            limits:
              memory: "512Mi"
              cpu: "750m"
            requests:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-service
spec:
  selector:
    app: postgresql
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubenews
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubenews
  template:
    metadata:
      labels:
        app: kubenews
    spec:
      serviceAccountName: kube-news-sa
      automountServiceAccountToken: false
      containers:
      - name: kubenews
        image: rfabricio/kube-news:v1.1
        imagePullPolicy: Always
        env:
          - name: DB_DATABASE
            valueFrom:
              configMapKeyRef:
                name: app-kube-news
                key: DB_DATABASE
          - name: DB_HOST
            value: "postgresql-service"
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: app-kube-news
                key: DB_USERNAME
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-kube-news
                key: DB_PASSWORD
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
        ports:
        - containerPort: 8080
      # imagePullSecrets:
      # - name: docker-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: kubenews-service
spec:
  selector:
    app: kubenews
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer

